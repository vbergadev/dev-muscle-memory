services:
  postgres:
    image: postgres:16-alpine
    container_name: devlab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devlab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devlab}
      POSTGRES_DB: ${POSTGRES_DB:-devlab}
    ports:
      # Configurable host port (avoids conflicts if you already run Postgres locally).
      # Set POSTGRES_PORT in .env if 5432 is taken.
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - devlab_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-devlab}']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  devlab_pgdata:
